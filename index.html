<!doctype html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <title>Buzzer</title>
    <link rel="icon" type="image/png" href="idle.png">
    <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-red: #b30000;
            --glass: rgba(255, 255, 255, 0.88);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #ffffff;
            font-family: 'Overpass', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 40px 0 10px;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .flowing-title {
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: 12px;
            margin: 0;
            filter: url(#water-ripple);
            background: linear-gradient(to right, var(--dark-red) 20%, var(--primary-red) 40%, #000 60%, var(--dark-red) 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite, float 6s ease-in-out infinite;
        }

        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        #pngButton {
            width: 300px;
            cursor: pointer;
            user-select: none;
            -webkit-user-drag: none;
            touch-action: manipulation;
            transition: transform 0.05s ease;
        }

        #pngButton:active { transform: scale(0.95); }

        .controls-overlay {
            position: absolute;
            bottom: 25px;
            display: flex;
            gap: 15px;
            padding: 15px 25px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            z-index: 20;
            max-width: 95vw;
            overflow-x: auto;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 80px;
        }

        label {
            font-size: 8px;
            font-weight: 800;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type=range] {
            width: 80px;
            accent-color: var(--primary-red);
            cursor: pointer;
        }

        select {
            background: transparent;
            border: none;
            font-family: 'Overpass', sans-serif;
            font-weight: 800;
            font-size: 10px;
            color: var(--dark-red);
            cursor: pointer;
            outline: none;
            text-transform: uppercase;
        }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @media (max-width: 900px) {
            .flowing-title { font-size: 2.5rem; letter-spacing: 4px; }
            #pngButton { width: 220px; }
            .controls-overlay { border-radius: 20px; width: 90%; flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>

<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="water-ripple">
            <feTurbulence id="turbulence" type="fractalNoise" baseFrequency="0.01 0.02" numOctaves="2" seed="1">
                <animate attributeName="baseFrequency" dur="10s" values="0.01 0.02; 0.02 0.04; 0.01 0.02" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" scale="12" />
        </filter>
    </svg>

    <header>
        <h1 class="flowing-title">BUZZER</h1>
    </header>

    <main>
        <img id="pngButton" src="idle.png" alt="Buzzer Button">
    </main>

    <div class="controls-overlay">
        <div class="control-item">
            <label>Preset</label>
            <select id="preset">
                <option value="custom">Custom</option>
                <option value="bleep">Censor Bleep</option>
                <option value="amber">Amber Alert</option>
                <option value="train">Train Horn</option>
                <option value="ufo">UFO Beam</option>
            </select>
        </div>
        <div class="control-item">
            <label>Wave</label>
            <select id="waveType">
                <option value="square" selected>Buzz</option>
                <option value="sine">Hum</option>
                <option value="sawtooth">Sharp</option>
                <option value="triangle">Soft</option>
            </select>
        </div>
        <div class="control-item"><label>Pitch</label><input type="range" id="pitch" min="60" max="1200" value="400"></div>
        <div class="control-item"><label>Bass</label><input type="range" id="bass" min="100" max="15000" value="15000"></div>
        <div class="control-item"><label>Chorus</label><input type="range" id="chorus" min="0" max="300" value="0"></div>
        <div class="control-item"><label>Reverb</label><input type="range" id="reverb" min="0" max="1" step="0.1" value="0"></div>
        <div class="control-item"><label>Volume</label><input type="range" id="volume" min="0" max="1" step="0.05" value="0.2"></div>
    </div>

    <script>
        const imgBtn = document.getElementById('pngButton');
        const pitchS = document.getElementById('pitch');
        const bassS = document.getElementById('bass');
        const chorS = document.getElementById('chorus');
        const revS = document.getElementById('reverb');
        const volS = document.getElementById('volume');
        const waveS = document.getElementById('waveType');
        const presetS = document.getElementById('preset');

        let audioCtx, masterGain, dryGain, wetGain, reverbNode, filter;
        let activeOscillators = [];
        let isPressed = false;

        const presets = {
            bleep: { wave: 'sine', pitch: 1000, bass: 15000, chorus: 0, reverb: 0 },
            amber: { wave: 'square', pitch: 853, bass: 15000, chorus: 107, reverb: 0 },
            train: { wave: 'sawtooth', pitch: 311, bass: 12000, chorus: 40, reverb: 0.3 },
            ufo: { wave: 'sine', pitch: 150, bass: 5000, chorus: 250, reverb: 0.8 }
        };

        presetS.onchange = () => {
            const p = presets[presetS.value];
            if (p) {
                waveS.value = p.wave;
                pitchS.value = p.pitch;
                bassS.value = p.bass;
                chorS.value = p.chorus;
                revS.value = p.reverb;
                if (isPressed) { stopBuzz(); startBuzz(); }
            }
        };

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            dryGain = audioCtx.createGain();
            wetGain = audioCtx.createGain();
            reverbNode = audioCtx.createConvolver();
            filter = audioCtx.createBiquadFilter();

            const len = audioCtx.sampleRate * 2;
            const buf = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
            for (let i = 0; i < 2; i++) {
                const chan = buf.getChannelData(i);
                for (let j = 0; j < len; j++) chan[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / len, 2.5);
            }
            reverbNode.buffer = buf;

            filter.connect(dryGain);
            filter.connect(reverbNode);
            reverbNode.connect(wetGain);
            dryGain.connect(masterGain);
            wetGain.connect(masterGain);
            masterGain.connect(audioCtx.destination);
            masterGain.gain.value = 0;
        }

        function createOsc(freq, type) {
            const osc = audioCtx.createOscillator();
            osc.type = type;
            osc.frequency.value = freq;
            osc.connect(filter);
            osc.start();
            activeOscillators.push(osc);
        }

        function startBuzz(e) {
            if (e) e.preventDefault();
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (isPressed) return;
            isPressed = true;
            imgBtn.src = "pressed.png";

            const baseFreq = parseFloat(pitchS.value);
            const chorVal = parseFloat(chorS.value);
            const type = waveS.value;

            filter.type = "lowpass";
            filter.frequency.value = parseFloat(bassS.value);
            wetGain.gain.value = parseFloat(revS.value);
            dryGain.gain.value = 1.0;

            if (presetS.value === 'train') {
                [1, 1.25, 1.5, 1.8, 2.0].forEach(mult => createOsc(baseFreq * mult, type));
            } else if (presetS.value === 'bleep') {
                // Pure 1000Hz Sine wave for censor
                createOsc(baseFreq, 'sine');
            } else {
                createOsc(baseFreq, type);
                if(chorVal > 0) createOsc(baseFreq + chorVal, type);
            }

            // Sharper attack for the bleep
            const attack = presetS.value === 'bleep' ? 0.005 : 0.02;
            masterGain.gain.setTargetAtTime(parseFloat(volS.value), audioCtx.currentTime, attack);
            if ("vibrate" in navigator) navigator.vibrate([1000]);
        }

        function stopBuzz() {
            if (!isPressed) return;
            isPressed = false;
            imgBtn.src = "idle.png";
            if (masterGain) {
                masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
                const toStop = [...activeOscillators];
                activeOscillators = [];
                setTimeout(() => {
                    toStop.forEach(o => { try { o.stop(); o.disconnect(); } catch(e) {} });
                }, 100);
            }
            if ("vibrate" in navigator) navigator.vibrate(0);
        }

        [pitchS, bassS, chorS, revS, volS].forEach(s => s.oninput = () => {
            if (!isPressed) return;
            const f = parseFloat(pitchS.value);
            filter.frequency.setTargetAtTime(parseFloat(bassS.value), audioCtx.currentTime, 0.03);
            wetGain.gain.setTargetAtTime(parseFloat(revS.value), audioCtx.currentTime, 0.03);
            masterGain.gain.setTargetAtTime(parseFloat(volS.value), audioCtx.currentTime, 0.03);
            
            if (presetS.value !== 'train' && presetS.value !== 'bleep' && activeOscillators.length >= 2) {
                activeOscillators[0].frequency.setTargetAtTime(f, audioCtx.currentTime, 0.03);
                activeOscillators[1].frequency.setTargetAtTime(f + parseFloat(chorS.value), audioCtx.currentTime, 0.03);
            } else if (activeOscillators.length >= 1) {
                activeOscillators[0].frequency.setTargetAtTime(f, audioCtx.currentTime, 0.03);
            }
        });

        imgBtn.addEventListener('mousedown', startBuzz);
        window.addEventListener('mouseup', stopBuzz);
        imgBtn.addEventListener('touchstart', startBuzz, {passive: false});
        window.addEventListener('touchend', stopBuzz);
    </script>
</body>
</html>
