<!doctype html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <title>Button | Synth Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@800&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: white;
            font-family: 'Overpass', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            width: 100%;
            padding: 40px 0;
            display: flex;
            justify-content: center;
        }

        .flowing-title {
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin: 0;
            filter: url(#water-ripple);
            background: linear-gradient(to right, #b30000 20%, #ff0000 40%, #8b0000 60%, #b30000 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite, float 6s ease-in-out infinite;
        }

        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #pngButton {
            width: 280px;
            cursor: pointer;
            user-select: none;
            -webkit-user-drag: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent; 
        }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        @media (max-width: 600px) {
            .flowing-title { font-size: 3rem; }
            #pngButton { width: 220px; }
        }
    </style>
</head>

<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="water-ripple">
            <feTurbulence id="turbulence" type="fractalNoise" baseFrequency="0.01 0.02" numOctaves="2" seed="1">
                <animate attributeName="baseFrequency" dur="8s" values="0.01 0.02; 0.02 0.04; 0.01 0.02" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" scale="12" />
        </filter>
    </svg>

    <header>
        <h1 class="flowing-title">BUTTON</h1>
    </header>

    <main>
        <img id="pngButton" src="idle.png" alt="Buzz Button">
    </main>

    <script>
        const imgBtn = document.getElementById('pngButton');
        const idleImg = "idle.png";
        const pressedImg = "pressed.png";

        // Preload image
        const preloadImg = new Image();
        preloadImg.src = pressedImg;

        // --- WEB AUDIO API SETUP ---
        let audioCtx = null;
        let oscillator = null;
        let gainNode = null;
        let isPressed = false;

        function startBuzz(e) {
            if (e) e.preventDefault();
            if (isPressed) return;
            isPressed = true;

            imgBtn.src = pressedImg;

            // Initialize Audio Context on first interaction
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            // Create Oscillator (The Sound Generator)
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();

            oscillator.type = 'square'; // 'square' creates a buzzier, more mechanical sound
            oscillator.frequency.setValueAtTime(100, audioCtx.currentTime); // Low frequency for a "deep" buzz

            // Connect and start
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            // Fade in slightly to avoid a "pop"
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);

            oscillator.start();

            // Vibrate
            if ("vibrate" in navigator) {
                navigator.vibrate([1000, 50, 1000]);
            }
        }

        function stopBuzz() {
            if (!isPressed) return;
            isPressed = false;

            imgBtn.src = idleImg;

            // Stop the oscillator with a tiny fade out
            if (gainNode) {
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                setTimeout(() => {
                    if (oscillator) {
                        oscillator.stop();
                        oscillator.disconnect();
                    }
                }, 100);
            }

            // Stop vibration
            if ("vibrate" in navigator) {
                navigator.vibrate(0);
            }
        }

        // Mouse and Touch Listeners
        imgBtn.addEventListener('mousedown', startBuzz);
        window.addEventListener('mouseup', stopBuzz);
        imgBtn.addEventListener('touchstart', startBuzz);
        window.addEventListener('touchend', stopBuzz);
        window.addEventListener('touchcancel', stopBuzz);
    </script>

</body>
</html>
