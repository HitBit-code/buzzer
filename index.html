<!doctype html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <title>Buzzer | High Pitch Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@800&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: white;
            font-family: 'Overpass', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            width: 100%;
            padding: 40px 0;
            display: flex;
            justify-content: center;
        }

        /* The Rippling Title */
        .flowing-title {
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin: 0;
            
            /* Apply the water ripple filter */
            filter: url(#water-ripple);
            
            /* Deep red flowing gradient - guaranteed no pink */
            background: linear-gradient(
                to right, 
                #b30000 20%, 
                #ff0000 40%, 
                #8b0000 60%, 
                #b30000 80%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            
            animation: shine 4s linear infinite, float 6s ease-in-out infinite;
        }

        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* PNG Button Styling */
        #pngButton {
            width: 280px;
            cursor: pointer;
            user-select: none;
            -webkit-user-drag: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent; 
        }

        /* Animations */
        @keyframes shine { to { background-position: 200% center; } }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* Responsive Title for smaller screens */
        @media (max-width: 600px) {
            .flowing-title { font-size: 3rem; }
            #pngButton { width: 220px; }
        }
    </style>
</head>

<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="water-ripple">
            <feTurbulence id="turbulence" type="fractalNoise" baseFrequency="0.01 0.02" numOctaves="2" seed="1">
                <animate 
                    attributeName="baseFrequency" 
                    dur="8s" 
                    values="0.01 0.02; 0.02 0.04; 0.01 0.02" 
                    repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" scale="12" />
        </filter>
    </svg>

    <header>
        <h1 class="flowing-title">BUZZER</h1>
    </header>

    <main>
        <img id="pngButton" src="idle.png" alt="Buzzer Button">
    </main>

    <script>
        const imgBtn = document.getElementById('pngButton');
        const idleImg = "idle.png";
        const pressedImg = "pressed.png";

        // Preload image
        const preloadImg = new Image();
        preloadImg.src = pressedImg;

        // --- WEB AUDIO API SETUP ---
        let audioCtx = null;
        let oscillator = null;
        let gainNode = null;
        let isPressed = false;

        function startBuzz(e) {
            if (e) e.preventDefault();
            
            // Safety check to prevent duplicate oscillators
            if (isPressed) return;
            isPressed = true;

            imgBtn.src = pressedImg;

            // Init Context
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // Create Audio Chain
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();

            oscillator.type = 'square'; 
            oscillator.frequency.setValueAtTime(400, audioCtx.currentTime); // 400Hz is much higher pitched

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            // Clean fade in to prevent clicking sounds
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.02);

            oscillator.start();

            // Vibration
            if ("vibrate" in navigator) {
                navigator.vibrate([1000, 50, 1000]);
            }
        }

        function stopBuzz() {
            if (!isPressed) return;
            isPressed = false;

            imgBtn.src = idleImg;

            if (gainNode && oscillator) {
                // Instant silence to stop "ghost buzzing"
                gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
                gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.01);
                
                oscillator.stop(audioCtx.currentTime + 0.02);
                
                // Cleanup
                const oldOsc = oscillator;
                const oldGain = gainNode;
                setTimeout(() => {
                    oldOsc.disconnect();
                    oldGain.disconnect();
                }, 50);

                oscillator = null;
                gainNode = null;
            }

            if ("vibrate" in navigator) {
                navigator.vibrate(0);
            }
        }

        // Global listeners for mouse release (even if mouse leaves the button)
        imgBtn.addEventListener('mousedown', startBuzz);
        window.addEventListener('mouseup', stopBuzz);

        // Mobile touch listeners
        imgBtn.addEventListener('touchstart', startBuzz, {passive: false});
        window.addEventListener('touchend', stopBuzz);
        window.addEventListener('touchcancel', stopBuzz);
    </script>

</body>
</html>
