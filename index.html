<!doctype html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <title>Buzzer</title>
    <link rel="icon" type="image/png" href="idle.png">
    <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-red: #b30000;
            --glass: rgba(255, 255, 255, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #ffffff;
            font-family: 'Overpass', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 50px 0 10px;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .flowing-title {
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: 12px;
            margin: 0;
            filter: url(#water-ripple);
            background: linear-gradient(to right, var(--dark-red) 20%, var(--primary-red) 40%, #000 60%, var(--dark-red) 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite, float 6s ease-in-out infinite;
        }

        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        #pngButton {
            width: 300px;
            cursor: pointer;
            user-select: none;
            -webkit-user-drag: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .controls-overlay {
            position: absolute;
            bottom: 25px;
            display: flex;
            gap: 20px;
            padding: 15px 30px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            border: 1px solid rgba(0,0,0,0.08);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            z-index: 20;
            max-width: 95vw;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 70px;
        }

        label {
            font-size: 8px;
            font-weight: 800;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        input[type=range] {
            width: 80px;
            accent-color: var(--primary-red);
            cursor: pointer;
        }

        select {
            background: transparent;
            border: none;
            font-family: 'Overpass', sans-serif;
            font-weight: 800;
            font-size: 10px;
            color: var(--dark-red);
            cursor: pointer;
            outline: none;
            text-transform: uppercase;
        }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        @media (max-width: 900px) {
            .flowing-title { font-size: 2.2rem; letter-spacing: 5px; }
            #pngButton { width: 200px; }
            .controls-overlay { border-radius: 25px; gap: 8px; padding: 12px; flex-wrap: wrap; justify-content: center; width: 90%; }
        }
    </style>
</head>

<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="water-ripple">
            <feTurbulence id="turbulence" type="fractalNoise" baseFrequency="0.01 0.02" numOctaves="2" seed="1">
                <animate attributeName="baseFrequency" dur="10s" values="0.01 0.02; 0.02 0.04; 0.01 0.02" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" scale="12" />
        </filter>
    </svg>

    <header>
        <h1 class="flowing-title">BUZZER</h1>
    </header>

    <main>
        <img id="pngButton" src="idle.png" alt="Buzzer Button">
    </main>

    <div class="controls-overlay">
        <div class="control-item">
            <label>Wave</label>
            <select id="waveType">
                <option value="square" selected>Buzz</option>
                <option value="sine">Hum</option>
                <option value="sawtooth">Sharp</option>
                <option value="triangle">Soft</option>
            </select>
        </div>
        <div class="control-item">
            <label>Pitch</label>
            <input type="range" id="pitch" min="60" max="1000" value="400">
        </div>
        <div class="control-item">
            <label>Bass</label>
            <input type="range" id="bass" min="100" max="10000" value="10000">
        </div>
        <div class="control-item">
            <label>Chorus</label>
            <input type="range" id="chorus" min="0" max="50" value="0">
        </div>
        <div class="control-item">
            <label>Reverb</label>
            <input type="range" id="reverb" min="0" max="1" step="0.1" value="0">
        </div>
        <div class="control-item">
            <label>Volume</label>
            <input type="range" id="volume" min="0" max="1" step="0.05" value="0.2">
        </div>
    </div>

    <script>
        const imgBtn = document.getElementById('pngButton');
        const pitchS = document.getElementById('pitch');
        const bassS = document.getElementById('bass');
        const chorS = document.getElementById('chorus');
        const revS = document.getElementById('reverb');
        const volS = document.getElementById('volume');
        const waveS = document.getElementById('waveType');

        let audioCtx, masterGain, dryGain, wetGain, reverbNode, filter;
        let osc1, osc2;
        let isPressed = false;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            masterGain = audioCtx.createGain();
            dryGain = audioCtx.createGain();
            wetGain = audioCtx.createGain();
            reverbNode = audioCtx.createConvolver();
            filter = audioCtx.createBiquadFilter();

            const len = audioCtx.sampleRate * 1.5;
            const buf = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
            for (let i = 0; i < 2; i++) {
                const chan = buf.getChannelData(i);
                for (let j = 0; j < len; j++) chan[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / len, 2);
            }
            reverbNode.buffer = buf;

            filter.connect(dryGain);
            filter.connect(reverbNode);
            reverbNode.connect(wetGain);
            dryGain.connect(masterGain);
            wetGain.connect(masterGain);
            masterGain.connect(audioCtx.destination);

            masterGain.gain.value = 0;
            filter.type = "lowpass";
        }

        function startBuzz(e) {
            if (e) e.preventDefault();
            initAudio();
            
            // Re-resume context just in case browser suspended it
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if (isPressed) return;
            isPressed = true;
            imgBtn.src = "pressed.png";

            osc1 = audioCtx.createOscillator();
            osc2 = audioCtx.createOscillator();

            osc1.type = osc2.type = waveS.value;
            osc1.frequency.value = parseFloat(pitchS.value);
            osc2.frequency.value = parseFloat(pitchS.value) + parseFloat(chorS.value);

            filter.frequency.value = parseFloat(bassS.value);
            dryGain.gain.value = 1.0;
            wetGain.gain.value = parseFloat(revS.value);

            osc1.connect(filter);
            osc2.connect(filter);

            osc1.start(0);
            osc2.start(0);

            masterGain.gain.setTargetAtTime(parseFloat(volS.value), audioCtx.currentTime, 0.02);

            if ("vibrate" in navigator) navigator.vibrate([1000, 50, 1000]);
        }

        function stopBuzz() {
            if (!isPressed) return;
            isPressed = false;
            imgBtn.src = "idle.png";

            if (masterGain) {
                masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
                
                // Keep references to stop them properly after fade
                const activeOsc1 = osc1;
                const activeOsc2 = osc2;
                
                setTimeout(() => {
                    if (activeOsc1) { activeOsc1.stop(); activeOsc1.disconnect(); }
                    if (activeOsc2) { activeOsc2.stop(); activeOsc2.disconnect(); }
                }, 100);
            }
            if ("vibrate" in navigator) navigator.vibrate(0);
        }

        // Live Slider updates
        pitchS.oninput = () => {
            const freq = parseFloat(pitchS.value);
            if(osc1) osc1.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.03);
            if(osc2) osc2.frequency.setTargetAtTime(freq + parseFloat(chorS.value), audioCtx.currentTime, 0.03);
        };
        chorS.oninput = () => {
            if(osc2) osc2.frequency.setTargetAtTime(parseFloat(pitchS.value) + parseFloat(chorS.value), audioCtx.currentTime, 0.03);
        };
        bassS.oninput = () => { if(filter) filter.frequency.setTargetAtTime(parseFloat(bassS.value), audioCtx.currentTime, 0.03); };
        revS.oninput = () => { if(wetGain) wetGain.gain.setTargetAtTime(parseFloat(revS.value), audioCtx.currentTime, 0.03); };
        volS.oninput = () => { if(masterGain && isPressed) masterGain.gain.setTargetAtTime(parseFloat(volS.value), audioCtx.currentTime, 0.03); };

        imgBtn.addEventListener('mousedown', startBuzz);
        window.addEventListener('mouseup', stopBuzz);
        imgBtn.addEventListener('touchstart', startBuzz, {passive: false});
        window.addEventListener('touchend', stopBuzz);
    </script>
</body>
</html>
